services:
  k8s-cost-optimizer:
    build: .
    container_name: k8s-cost-optimizer
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro

  grafana:
    image: grafana/grafana:9.5.0
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
