apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-cost-optimizer.fullname" . }}

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-cost-optimizer.fullname" . }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-cost-optimizer.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-cost-optimizer.fullname" . }}
roleRef:
  kind: Role
  name: {{ include "k8s-cost-optimizer.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
