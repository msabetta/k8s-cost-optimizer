apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-cost-optimizer

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-cost-optimizer
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-cost-optimizer
subjects:
  - kind: ServiceAccount
    name: k8s-cost-optimizer
roleRef:
  kind: Role
  name: k8s-cost-optimizer
  apiGroup: rbac.authorization.k8s.io
