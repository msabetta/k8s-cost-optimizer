apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-cost-optimizer-config
data:
  config.yaml: |
    server:
      port: 8080
    collector:
      scrape_interval: 15s
      prometheus_url: http://prometheus:9090
    forecast:
      lookback_hours: 24
      anomaly_threshold: 1.5

  pricing.yaml: |
    cpu:
      price_per_core: 0.05
    memory:
      price_per_gb: 0.01
